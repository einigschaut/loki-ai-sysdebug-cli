name: Bug report
description: Report a problem with Loki (the CLI itself, not a security vulnerability).
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **If this is a security vulnerability** (e.g. related to secret
        handling, the allow-list gate, host isolation/footprint, or agent
        guardrails), please **do not** file it here — use GitHub's
        Private Vulnerability Reporting instead (Security tab -> "Report
        a vulnerability"). See [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: >-
        Exact command(s) you ran, in order. Include flags and, if
        relevant, the state of the USB stick / working directory.
      placeholder: |
        1. loki <command> <flags>
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: >-
        What actually happened. Include the full error message / exit
        code if there was one. Redact any secrets, API keys, hostnames,
        or other sensitive output before pasting.
    validations:
      required: true

  - type: input
    id: loki-version
    attributes:
      label: Loki version
      description: Output of `loki version` (or the contents of `version.txt`).
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: textarea
    id: loki-status
    attributes:
      label: "`loki status` output"
      description: >-
        Paste the output of `loki status`, if it runs at all. Redact
        anything sensitive.
      render: text
    validations:
      required: false

  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: e.g. Windows 11 23H2, Windows 10 22H2.
    validations:
      required: true

  - type: input
    id: pwsh-version
    attributes:
      label: PowerShell version
      description: Output of `$PSVersionTable.PSVersion` (should normally be 5.1).
      placeholder: e.g. 5.1.19041.4046
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: >-
        Anything else relevant: managed/unmanaged device, AppLocker/WDAC,
        Constrained Language Mode, running from the USB stick vs. a local
        checkout, network state (online/offline engine), etc.
    validations:
      required: false
