name: release-please

# Opens a Release PR the maintainer merges deliberately (SemVer).
# release-please tracks Conventional Commits on `main` and, once commits
# warranting a release land (feat -> minor, fix -> patch; pre-1.0 keeps
# breaking changes on minor), opens/updates a standing "Release PR" that
# bumps version.txt, moves the CHANGELOG section, and tags vX.Y.Z on merge.
# Nothing ships until a human merges that PR -- this workflow never
# publishes on its own. See docs/adr/0005-versioning-and-releases.md.
#
# Manifest mode: configuration lives in release-please-config.json and the
# last-released version in .release-please-manifest.json (both at the repo
# root). The `simple` strategy is the one that reads/writes version.txt.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # Fine-grained PAT, NOT the default GITHUB_TOKEN: a PR opened via GITHUB_TOKEN does not
          # trigger further workflows (GitHub's anti-recursion rule), which would leave every Release
          # PR without CI. Using a PAT makes the Release PR run the normal CI gate before it is merged.
          # Secret RELEASE_PLEASE_TOKEN = a repo-scoped PAT (Contents + Pull requests: RW); renew before
          # it expires or the bot can no longer open Release PRs. See docs/adr/0005-versioning-and-releases.md.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
